<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiny RAG Demo</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Offline Retrieval-Augmented Generation</p>
        <h1>本地可跑的 RAG 小实验室</h1>
        <p class="hero-copy">
          输入一个问题，页面会展示离线检索生成的答案，以及命中的知识片段。整个 demo 不依赖第三方后端框架，适合拿来继续改造成你自己的原型。
        </p>
      </header>

      <main class="layout">
        <section class="panel ask-panel">
          <div class="panel-head">
            <h2>提问</h2>
            <span class="badge">TF-IDF + Chunk Retrieval</span>
          </div>

          <form id="ask-form" class="ask-form">
            <label class="field">
              <span>你的问题</span>
              <textarea
                id="query-input"
                name="query"
                rows="4"
                placeholder="输入你想问文档库的问题"
              ></textarea>
            </label>

            <div class="controls">
              <label class="field compact">
                <span>召回条数</span>
                <input id="top-k-input" name="top_k" type="number" min="1" max="8" value="3" />
              </label>

              <div class="actions">
                <button type="submit" id="submit-button">开始检索</button>
              </div>
            </div>
          </form>

          <div class="library-panel">
            <div class="library-head">
              <div>
                <h3>文档库</h3>
                <p id="library-caption" class="library-caption hidden">正在读取文档库信息...</p>
              </div>
              <button type="button" id="reload-button" class="ghost small">重新入库</button>
            </div>

            <p id="library-meta" class="library-meta"></p>
            <div id="library-list" class="library-list">
              <article class="context-card muted">
                <p>这里会显示当前已入库的文件。</p>
              </article>
            </div>
            <p id="skipped-meta" class="skipped-meta hidden"></p>
          </div>
        </section>

        <section class="panel result-panel">
          <div class="panel-head">
            <h2>回答与上下文</h2>
            <span id="status-pill" class="status-pill">等待提问</span>
          </div>

          <div id="error-box" class="error-box hidden"></div>

          <div class="result-block">
            <h3>回答</h3>
            <ul id="answer-list" class="answer-list">
              <li>这里会显示回答。</li>
            </ul>
          </div>

          <div class="result-block">
            <h3>命中的文档片段</h3>
            <div id="context-list" class="context-list">
              <article class="context-card muted">
                <p>提交问题后，这里会显示检索命中的上下文和分数。</p>
              </article>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
  </html>
