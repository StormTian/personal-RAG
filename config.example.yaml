# Example configuration file for RAG System
# Copy this to config.yaml and customize as needed

# Server configuration
server:
  host: "127.0.0.1"
  port: 8000
  workers: 1
  timeout: 30
  max_request_size: 10000000
  enable_cors: true
  cors_origins:
    - "*"

# Embedding backend configuration
embedding:
  # Backend type: "local-hash" or "openai-compatible"
  backend: "local-hash"
  
  # Local hash embedding settings
  dimensions: 256
  projections_per_token: 8
  
  # OpenAI-compatible settings (used when backend is "openai-compatible")
  # api_key: "${OPENAI_API_KEY}"
  # model: "text-embedding-3-small"
  # base_url: "https://api.openai.com"
  # timeout: 30
  # batch_size: 32
  # max_retries: 3
  # retry_delay: 1.0

# Reranker backend configuration
reranker:
  # Backend type: "local-heuristic" or "openai-compatible"
  backend: "local-heuristic"
  strategy: "embedding+lexical-overlap"
  
  # OpenAI-compatible settings
  # api_key: "${OPENAI_API_KEY}"
  # model: "gpt-4"
  # base_url: "https://api.openai.com"
  # timeout: 45
  # max_candidates: 12

# Retrieval configuration
retrieval:
  top_k: 3
  candidate_pool_multiplier: 6
  min_candidate_pool: 8
  bm25_k1: 1.5
  bm25_b: 0.75
  max_lexical_weight: 0.30
  max_title_weight: 0.10
  max_semantic_weight: 0.60

# Text chunking configuration
chunking:
  max_chars: 240
  overlap: 1
  min_sentence_length: 6

# Cache configuration
cache:
  enabled: true
  cache_dir: ".index_cache"
  max_age_hours: 168  # 7 days
  compression: true

# Logging configuration
logging:
  level: "INFO"
  format: "json"
  # file_path: "/var/log/rag_system/app.log"
  max_bytes: 10000000
  backup_count: 5
  enable_console: true

# Monitoring configuration
monitoring:
  enabled: true
  metrics_port: 9090
  collect_latency: true
  collect_throughput: true
  health_check_interval: 30

# Security configuration
security:
  rate_limit_enabled: true
  rate_limit_requests: 100
  rate_limit_window: 60
  max_query_length: 1000
  max_upload_size: 104857600  # 100MB
  allowed_file_extensions:
    - ".md"
    - ".markdown"
    - ".txt"
    - ".doc"
    - ".docx"
    - ".pdf"
  api_key_header: "X-API-Key"
  require_api_key: false

# Upload configuration
upload:
  max_file_size: 104857600  # 100MB
  allowed_extensions:
    - ".md"
    - ".markdown"
    - ".txt"
    - ".doc"
    - ".docx"
    - ".pdf"
  auto_reload: true

# History configuration
history:
  enabled: true
  db_path: "data/upload_history.db"

# Document library directory
library_dir: "document_library"

# Debug mode
debug: false
